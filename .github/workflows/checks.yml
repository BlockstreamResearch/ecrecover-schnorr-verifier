name: "checks"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run lint checks
        run: bun run lint

      - name: Run hardhat tests
        run: bun run test

      - name: Run Rust helper tests
        run: cargo test --manifest-path tools/schnorr-ffi/Cargo.toml

      - name: Run Foundry fuzz tests
        run: bun run forge:test
